version: "3.9"

# Standalone dev compose for module-feeds.
# In production the module connects to the platform's shared postgres/redis.
# For local development this compose spins up its own postgres + redis.

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: feeds_dev
      POSTGRES_USER: feeds
      POSTGRES_PASSWORD: feeds_password
    ports:
      - "5433:5432"          # offset to avoid clash with platform's 5432
    volumes:
      - feeds_pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"          # offset to avoid clash with platform's 6379

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feeds:feeds_password@postgres:5432/feeds_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feeds:feeds_password@postgres:5432/feeds_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  scheduler:
    build: .
    command: python -m app.scheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feeds:feeds_password@postgres:5432/feeds_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  feeds_pgdata:
