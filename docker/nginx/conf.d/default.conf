upstream etip_api_backend {
    server etip_api:3001;
}

server {
    listen 80;
    server_name _;

    location /health {
        proxy_pass http://etip_api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /ready {
        proxy_pass http://etip_api_backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ETIP</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,monospace;display:flex;align-items:center;justify-content:center;height:100vh}.c{text-align:center}h1{font-size:3rem;background:linear-gradient(135deg,#00ff88,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}.s{color:#888;font-size:1.1rem;margin-bottom:2rem}.st{display:inline-block;padding:.5rem 1.5rem;border:1px solid #00ff8844;border-radius:2rem;color:#00ff88;font-size:.9rem}.st::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:#00ff88;margin-right:8px;animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}.v{color:#444;margin-top:2rem;font-size:.8rem}</style></head><body><div class="c"><h1>IntelWatch ETIP</h1><p class="s">Enterprise Threat Intelligence Platform</p><span class="st">API Online</span><p class="v">v4.0.0 | ti.intelwatch.in</p></div></body></html>';
    }
}
