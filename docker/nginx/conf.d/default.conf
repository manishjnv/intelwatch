server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"ok","service":"etip-nginx","version":"4.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ETIP</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace;display:flex;align-items:center;justify-content:center;height:100vh}.container{text-align:center}h1{font-size:3rem;background:linear-gradient(135deg,#00ff88,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}.subtitle{color:#888;font-size:1.1rem;margin-bottom:2rem}.status{display:inline-block;padding:.5rem 1.5rem;border:1px solid #00ff8844;border-radius:2rem;color:#00ff88;font-size:.9rem}.status::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:#00ff88;margin-right:8px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.version{color:#444;margin-top:2rem;font-size:.8rem}</style></head><body><div class="container"><h1>IntelWatch ETIP</h1><p class="subtitle">Enterprise Threat Intelligence Platform</p><span class="status">Infrastructure Online</span><p class="version">v4.0.0 | ti.intelwatch.in</p></div></body></html>';
    }
}
