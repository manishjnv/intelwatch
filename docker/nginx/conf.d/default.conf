server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"ok","service":"etip-nginx","version":"4.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IntelWatch — Enterprise Threat Intelligence Platform</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#060610;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,255,136,0.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,170,255,0.03) 0%,transparent 50%)}.container{text-align:center;position:relative;z-index:1}h1{font-size:clamp(3rem,7vw,5.5rem);font-weight:800;margin-bottom:1.8rem;line-height:1.1;background:linear-gradient(135deg,#00ff88 0%,#00ccff 50%,#00ff88 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:shimmer 4s linear infinite}@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}.subtitle{font-size:clamp(1.1rem,2.5vw,1.5rem);color:#666;margin-bottom:2.5rem;font-weight:300;letter-spacing:0.03em}.subtitle .hl{color:#00ff88;font-weight:700;font-size:110%}.status{display:inline-flex;align-items:center;gap:8px;padding:0.6rem 1.8rem;border:1px solid rgba(0,255,136,0.2);border-radius:2rem;color:#00ff88;font-size:0.85rem;backdrop-filter:blur(4px);background:rgba(0,255,136,0.03)}.status .dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,0.4)}50%{opacity:0.5;box-shadow:0 0 0 8px rgba(0,255,136,0)}}.version{color:#2a2a2a;font-size:0.75rem;margin-top:2rem}</style></head><body><div class="bg"></div><div class="container"><h1>IntelWatch</h1><p class="subtitle"><span class="hl">E</span>nterprise <span class="hl">T</span>hreat <span class="hl">I</span>ntelligence <span class="hl">P</span>latform</p><div class="status"><span class="dot"></span> Infrastructure Online</div><p class="version">v4.0.0</p></div></body></html>';
    }
}
