# ETIP internal routing (inside etip_nginx container)
# Caddy (ti.intelwatch.in) → etip_nginx:80 → services
#
# ⚠️ FRONTEND: Proxied to etip_frontend container (React SPA)
# ⚠️ Landing page fallback removed — frontend is now the entry point

upstream etip_api_backend {
    server etip_api:3001;
}

upstream etip_ingestion_backend {
    server etip_ingestion:3004;
}

upstream etip_normalization_backend {
    server etip_normalization:3005;
}

upstream etip_enrichment_backend {
    server etip_enrichment:3006;
}

upstream etip_frontend_backend {
    server etip_frontend:80;
}

server {
    listen 80;
    server_name _;

    # ── API Gateway proxy ──────────────────────────────────────────
    location /health {
        proxy_pass http://etip_api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /ready {
        proxy_pass http://etip_api_backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Ingestion Service — feed management routes ─────────────
    location /api/v1/feeds {
        proxy_pass http://etip_ingestion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Ingestion Service — article routes ──────────────────
    location /api/v1/articles {
        proxy_pass http://etip_ingestion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Normalization Service — IOC routes ──────────────────
    location /api/v1/iocs {
        proxy_pass http://etip_normalization_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── AI Enrichment Service — enrichment routes ──────────
    location /api/v1/enrichment {
        proxy_pass http://etip_enrichment_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── API Gateway — all other API routes ───────────────────
    location /api/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── WebSocket proxy (future) ───────────────────────────────────
    location /ws/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend SPA (React via etip_frontend container) ───────────
    location / {
        proxy_pass http://etip_frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
