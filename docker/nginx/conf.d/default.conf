# ETIP internal routing (inside etip_nginx container)
# Caddy (ti.intelwatch.in) → etip_nginx:80 → services
#
# ⚠️ FRONTEND: Proxied to etip_frontend container (React SPA)
# ⚠️ Landing page fallback removed — frontend is now the entry point

upstream etip_api_backend {
    server etip_api:3001;
}

upstream etip_ingestion_backend {
    server etip_ingestion:3004;
}

upstream etip_normalization_backend {
    server etip_normalization:3005;
}

upstream etip_enrichment_backend {
    server etip_enrichment:3006;
}

upstream etip_ioc_intelligence_backend {
    server etip_ioc_intelligence:3007;
}

upstream etip_threat_actor_intel_backend {
    server etip_threat_actor_intel:3008;
}

upstream etip_malware_intel_backend {
    server etip_malware_intel:3009;
}

upstream etip_vulnerability_intel_backend {
    server etip_vulnerability_intel:3010;
}

upstream etip_threat_graph_backend {
    server etip_threat_graph:3012;
}

upstream etip_correlation_backend {
    server etip_correlation:3013;
}

upstream etip_hunting_backend {
    server etip_hunting:3014;
}

upstream etip_drp_backend {
    server etip_drp:3011;
}

upstream etip_integration_backend {
    server etip_integration:3015;
}

upstream etip_user_management_backend {
    server etip_user_management:3016;
}

upstream etip_customization_backend {
    server etip_customization:3017;
}

upstream etip_onboarding_backend {
    server etip_onboarding:3018;
}

upstream etip_billing_backend {
    server etip_billing:3019;
}

upstream etip_admin_backend {
    server etip_admin:3022;
}

upstream etip_es_indexing_backend {
    server etip_es_indexing:3020;
}

upstream etip_reporting_backend {
    server etip_reporting:3021;
}

upstream etip_alerting_backend {
    server etip_alerting:3023;
}

upstream etip_analytics_backend {
    server etip_analytics:3024;
}

upstream etip_frontend_backend {
    server etip_frontend:80;
}

server {
    listen 80;
    server_name _;

    # ── API Gateway proxy ──────────────────────────────────────────
    location /health {
        proxy_pass http://etip_api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /ready {
        proxy_pass http://etip_api_backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Ingestion Service — feed management routes ─────────────
    location /api/v1/feeds {
        proxy_pass http://etip_ingestion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Ingestion Service — article routes ──────────────────
    location /api/v1/articles {
        proxy_pass http://etip_ingestion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Normalization Service — IOC routes ──────────────────
    location /api/v1/iocs {
        proxy_pass http://etip_normalization_backend;
        proxy_http_version 1.1;
