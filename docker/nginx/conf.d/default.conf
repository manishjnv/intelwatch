server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"ok","service":"etip-nginx","version":"4.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IntelWatch ETIP — Enterprise Threat Intelligence Platform</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#060610;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,255,136,0.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,170,255,0.03) 0%,transparent 50%)}.container{text-align:center;position:relative;z-index:1}.logo{font-size:1rem;letter-spacing:0.4em;text-transform:uppercase;color:#555;margin-bottom:2rem}h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;margin-bottom:1.5rem;line-height:1.1}.brand{background:linear-gradient(135deg,#00ff88,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.subtitle{font-size:clamp(1.1rem,2.5vw,1.6rem);color:#888;margin-bottom:2.5rem;font-weight:300;letter-spacing:0.02em}.subtitle .hl{color:#00ff88;font-weight:700;font-size:110%}.status-row{display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem}.status{display:inline-flex;align-items:center;gap:8px;padding:0.5rem 1.5rem;border:1px solid rgba(0,255,136,0.25);border-radius:2rem;color:#00ff88;font-size:0.85rem;backdrop-filter:blur(4px);background:rgba(0,255,136,0.03)}.status .dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 2s ease-in-out infinite}.badge{padding:0.4rem 1rem;border-radius:1rem;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;border:1px solid rgba(0,170,255,0.25);color:#00aaff;background:rgba(0,170,255,0.05)}.services{display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}.svc{padding:0.3rem 0.8rem;border-radius:0.4rem;font-size:0.7rem;color:#555;border:1px solid #1a1a2e;background:#0d0d1a;font-family:monospace}.version{color:#333;font-size:0.75rem;margin-top:1rem}@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,0.4)}50%{opacity:0.6;box-shadow:0 0 0 6px rgba(0,255,136,0)}}</style></head><body><div class="bg"></div><div class="container"><div class="logo">IntelWatch</div><h1><span class="brand">ETIP</span></h1><p class="subtitle"><span class="hl">E</span>nterprise <span class="hl">T</span>hreat <span class="hl">I</span>ntelligence <span class="hl">P</span>latform</p><div class="status-row"><span class="status"><span class="dot"></span> Infrastructure Online</span><span class="badge">Phase 1</span></div><div class="services"><span class="svc">PostgreSQL</span><span class="svc">Redis</span><span class="svc">Elasticsearch</span><span class="svc">Neo4j</span><span class="svc">MinIO</span><span class="svc">Prometheus</span><span class="svc">Grafana</span><span class="svc">Nginx</span></div><p class="version">v4.0.0 &middot; ti.intelwatch.in</p></div></body></html>';
    }
}
