server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"ok","service":"etip-nginx","version":"4.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
