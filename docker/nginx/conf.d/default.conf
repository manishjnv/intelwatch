# ETIP internal routing (inside etip_nginx container)
# Caddy (ti.intelwatch.in) -> etip_nginx:80 -> services
#
# LANDING PAGE: Served from /usr/share/nginx/html/index.html
#   Source file: docker/nginx/landing.html (volume-mounted)
#   NEVER replace with inline HTML - keep the futuristic design consistent

upstream etip_api_backend {
    server etip_api:3001;
}

server {
    listen 80;
    server_name _;

    location /health {
        proxy_pass http://etip_api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /ready {
        proxy_pass http://etip_api_backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://etip_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Landing page (file-based, survives nginx config changes)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
