  # ─── ETIP Vulnerability Intel Service (Module 10) ───────────────
  etip_vulnerability_intel:
    image: etip-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etip_vulnerability_intel
    restart: unless-stopped
