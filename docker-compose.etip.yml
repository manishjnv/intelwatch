    image: etip-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: etip_frontend
    restart: unless-stopped
    healthcheck:
      # Use wget with 127.0.0.1 (not localhost — resolves to ::1 IPv6, nginx only binds IPv4)
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - etip_network
    deploy:
      resources:
        limits:
          memory: 64M

