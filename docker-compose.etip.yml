  # ─── ETIP AI Enrichment Service (Module 06) ─────────────────────
  etip_enrichment:
    image: etip-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etip_enrichment
    restart: unless-stopped
