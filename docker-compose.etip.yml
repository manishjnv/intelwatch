        condition: service_healthy
      etip_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
