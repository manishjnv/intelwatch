      TI_JWT_ACCESS_EXPIRY: ${TI_JWT_ACCESS_EXPIRY:-900}
      TI_JWT_REFRESH_EXPIRY: ${TI_JWT_REFRESH_EXPIRY:-604800}
      TI_SERVICE_JWT_SECRET: ${TI_SERVICE_JWT_SECRET:?TI_SERVICE_JWT_SECRET is required}
      TI_CORS_ORIGINS: ${TI_CORS_ORIGINS:-https://ti.intelwatch.in}
      TI_RATE_LIMIT_WINDOW_MS: ${TI_RATE_LIMIT_WINDOW_MS:-60000}
      TI_RATE_LIMIT_MAX_REQUESTS: ${TI_RATE_LIMIT_MAX_REQUESTS:-100}
      TI_LOG_LEVEL: ${TI_LOG_LEVEL:-info}
      TI_AI_ENABLED: ${TI_AI_ENABLED:-false}
      TI_VIRUSTOTAL_API_KEY: ${TI_VIRUSTOTAL_API_KEY:-}
      TI_ABUSEIPDB_API_KEY: ${TI_ABUSEIPDB_API_KEY:-}
      TI_ENRICHMENT_CONCURRENCY: ${TI_ENRICHMENT_CONCURRENCY:-2}
      TI_VT_RATE_LIMIT_PER_MIN: ${TI_VT_RATE_LIMIT_PER_MIN:-4}
      TI_ABUSEIPDB_RATE_LIMIT_PER_DAY: ${TI_ABUSEIPDB_RATE_LIMIT_PER_DAY:-1000}
    ports:
      - "3006:3006"
    depends_on:
      etip_postgres:
        condition: service_healthy
      etip_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - etip_network
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── ETIP IOC Intelligence Service (Module 07) ─────────────────
