    container_name: etip_alerting
    restart: unless-stopped
    command: ["node", "apps/alerting-service/dist/index.js"]
    environment:
      TI_NODE_ENV: ${TI_NODE_ENV:-production}
      TI_SERVICE_PORT: 3023
      TI_SERVICE_HOST: 0.0.0.0
      TI_REDIS_URL: redis://:${TI_REDIS_PASSWORD}@etip_redis:6379/0
      TI_JWT_SECRET: ${TI_JWT_SECRET:?TI_JWT_SECRET is required}
      TI_SERVICE_JWT_SECRET: ${TI_SERVICE_JWT_SECRET:?TI_SERVICE_JWT_SECRET is required}
      TI_CORS_ORIGINS: ${TI_CORS_ORIGINS:-https://ti.intelwatch.in}
      TI_RATE_LIMIT_WINDOW_MS: ${TI_RATE_LIMIT_WINDOW_MS:-60000}
      TI_RATE_LIMIT_MAX: ${TI_RATE_LIMIT_MAX_REQUESTS:-200}
      TI_LOG_LEVEL: ${TI_LOG_LEVEL:-info}
    ports:
      - "3023:3023"
    depends_on:
      etip_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3023/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - etip_network
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Analytics Service — Dashboard analytics & trend aggregation (Module 24) ────
  etip_analytics:
    image: etip-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etip_analytics
    restart: unless-stopped
    command: ["node", "apps/analytics-service/dist/index.js"]
    environment:
      TI_NODE_ENV: ${TI_NODE_ENV:-production}
      TI_SERVICE_PORT: 3024
      TI_SERVICE_HOST: 0.0.0.0
      TI_JWT_SECRET: ${TI_JWT_SECRET:?TI_JWT_SECRET is required}
      TI_SERVICE_JWT_SECRET: ${TI_SERVICE_JWT_SECRET:?TI_SERVICE_JWT_SECRET is required}
      TI_CORS_ORIGINS: ${TI_CORS_ORIGINS:-https://ti.intelwatch.in}
      TI_RATE_LIMIT_WINDOW_MS: ${TI_RATE_LIMIT_WINDOW_MS:-60000}
      TI_RATE_LIMIT_MAX: ${TI_RATE_LIMIT_MAX_REQUESTS:-200}
      TI_LOG_LEVEL: ${TI_LOG_LEVEL:-info}
    ports:
      - "3024:3024"
    depends_on:
      etip_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3024/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - etip_network
    deploy:
      resources:
        limits:
          memory: 256M

  etip_caching:
    image: etip-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etip_caching
    restart: unless-stopped
    command: ["node", "apps/caching-service/dist/index.js"]
    environment:
      TI_NODE_ENV: ${TI_NODE_ENV:-production}
      TI_SERVICE_PORT: 3025
      TI_SERVICE_HOST: 0.0.0.0
      TI_JWT_SECRET: ${TI_JWT_SECRET:?TI_JWT_SECRET is required}
      TI_SERVICE_JWT_SECRET: ${TI_SERVICE_JWT_SECRET:?TI_SERVICE_JWT_SECRET is required}
      TI_CORS_ORIGINS: ${TI_CORS_ORIGINS:-https://ti.intelwatch.in}
      TI_RATE_LIMIT_WINDOW_MS: ${TI_RATE_LIMIT_WINDOW_MS:-60000}
      TI_RATE_LIMIT_MAX: ${TI_RATE_LIMIT_MAX_REQUESTS:-200}
      TI_LOG_LEVEL: ${TI_LOG_LEVEL:-info}
      TI_REDIS_URL: redis://:${TI_REDIS_PASSWORD:?TI_REDIS_PASSWORD is required}@etip_redis:6379/0
      TI_MINIO_ENDPOINT: etip_minio
      TI_MINIO_PORT: 9000
      TI_MINIO_ACCESS_KEY: ${TI_MINIO_ACCESS_KEY:-etip_minio_admin}
      TI_MINIO_SECRET_KEY: ${TI_MINIO_SECRET_KEY:?TI_MINIO_SECRET_KEY is required}
      TI_ANALYTICS_URL: http://etip_analytics:3024
      TI_ARCHIVE_CRON: "0 2 * * *"
      TI_CACHE_WARM_CRON: "*/30 * * * *"
    ports:
      - "3025:3025"
    depends_on:
      etip_redis:
        condition: service_healthy
      etip_minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3025/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - etip_network
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Nginx — Reverse Proxy, Rate Limiting, Security Headers ─────
  etip_nginx:
    image: nginx:1.27-alpine
    container_name: etip_nginx
    restart: unless-stopped
    ports:
      - "${TI_NGINX_HTTP_PORT:-8080}:80"
      - "${TI_NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - etip_nginx_logs:/var/log/nginx
    depends_on:
      etip_api:
        condition: service_healthy
      etip_frontend:
        condition: service_healthy
      etip_ingestion:
        condition: service_healthy
      etip_normalization:
        condition: service_healthy
      etip_enrichment:
        condition: service_healthy
      etip_ioc_intelligence:
        condition: service_healthy
      etip_threat_actor_intel:
        condition: service_healthy
      etip_malware_intel:
        condition: service_healthy
      etip_vulnerability_intel:
        condition: service_healthy
      etip_threat_graph:
        condition: service_healthy
      etip_correlation:
        condition: service_healthy
      etip_hunting:
        condition: service_healthy
      etip_drp:
        condition: service_healthy
      etip_integration:
        condition: service_healthy
      etip_user_management:
        condition: service_healthy
      etip_customization:
        condition: service_healthy
      etip_onboarding:
        condition: service_healthy
      etip_billing:
        condition: service_healthy
      etip_admin:
        condition: service_healthy
      etip_es_indexing:
        condition: service_healthy
      etip_reporting:
        condition: service_healthy
      etip_alerting:
        condition: service_healthy
      etip_analytics:
        condition: service_healthy
      etip_caching:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - etip_network
      - caddy_network  # Caddy reverse proxy (ti.intelwatch.in → etip_nginx:80)
    deploy:
      resources:
        limits:
          memory: 128M

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  etip_postgres_data:
    name: etip_postgres_data
  etip_redis_data:
    name: etip_redis_data
  etip_elasticsearch_data:
    name: etip_elasticsearch_data
  etip_neo4j_data:
    name: etip_neo4j_data
  etip_neo4j_logs:
    name: etip_neo4j_logs
  etip_minio_data:
    name: etip_minio_data
  etip_prometheus_data:
    name: etip_prometheus_data
  etip_grafana_data:
    name: etip_grafana_data
  etip_nginx_logs:
    name: etip_nginx_logs

# ─── Networks ─────────────────────────────────────────────────────────
networks:
  etip_network:
    name: etip_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  # External: Caddy reverse proxy network (ti-platform_default)
  # RULE: NEVER use manual 'docker network connect' — this join is automatic (03-DEVOPS.md)
  caddy_network:
    name: ti-platform_default
    external: true
