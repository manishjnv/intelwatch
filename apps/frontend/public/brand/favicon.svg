<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00ddff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#07090e"/>
    </linearGradient>
    <radialGradient id="cg" cx="50%" cy="48%" r="30%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ddff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="url(#fg)" stroke-width="1.2" opacity="0.5"/>
  <!-- Shield — simplified, bold stroke -->
  <path d="M16 5 C16 5, 17 5, 17.5 5.2
    L26 9 C26.5 9.2, 27 9.8, 27 10.4
    L27 18 C27 21, 25 24, 22 26
    C20 27.5, 17 28.5, 16.2 28.8
    C16 28.9, 15.8 28.8, 15.8 28.8
    C15 28.5, 12 27.5, 10 26
    C7 24, 5 21, 5 18
    L5 10.4 C5 9.8, 5.5 9.2, 6 9
    L14.5 5.2 C15 5, 16 5, 16 5 Z"
    fill="url(#bg)" stroke="url(#fg)" stroke-width="1.4"/>
  <!-- Single bold ring -->
  <circle cx="16" cy="15.5" r="5.5" fill="none" stroke="url(#fg)" stroke-width="1.2" opacity="0.6"/>
  <!-- Glowing core — the main focal point at 16px -->
  <circle cx="16" cy="15.5" r="3" fill="url(#cg)" opacity="0.4"/>
  <circle cx="16" cy="15.5" r="2.2" fill="url(#fg)"/>
  <circle cx="16" cy="15.5" r="1" fill="#ffffff" opacity="0.95"/>
  <!-- Radar sweep — single bold arc -->
  <path d="M16 15.5 L21.5 13" stroke="#00ff88" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
  <!-- Keystone dot -->
  <circle cx="16" cy="5" r="1.5" fill="#00ff88" opacity="0.9"/>
</svg>
