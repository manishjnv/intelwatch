# ═══════════════════════════════════════════════════════════════
# ETIP VPS Command Runner
# Uses Cloudflare Tunnel (ssh.intelwatch.in) for reliable SSH.
# No more port 22 filtering timeouts.
#
# Usage: gh workflow run vps-cmd.yml -f cmd="docker ps"
# ═══════════════════════════════════════════════════════════════

name: VPS Command

on:
  workflow_dispatch:
    inputs:
      cmd:
        description: 'Shell command to run on VPS (runs as root in /opt/intelwatch)'
        required: true
        type: string

jobs:
  run:
    name: Run on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.intelwatch.in
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Execute command on VPS
        timeout-minutes: 5
        run: |
          ssh ssh.intelwatch.in << 'REMOTE'
          set -e
          cd /opt/intelwatch
          echo "━━━ VPS Command Runner ━━━"
          echo "Time: $(date -u)"
          echo "Cmd: ${{ inputs.cmd }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          ${{ inputs.cmd }}
          echo ""
          echo "━━━ Done ━━━"
          REMOTE
