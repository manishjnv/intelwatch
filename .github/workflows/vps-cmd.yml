# ═══════════════════════════════════════════════════════════════
# ETIP VPS Command Runner
# Allows Claude (and developers) to run arbitrary commands on the
# VPS via GitHub Actions, since the Claude sandbox blocks raw TCP
# on port 22 and cannot SSH directly.
#
# Usage via GitHub API:
#   POST /repos/manishjnv/intelwatch/actions/workflows/vps-cmd.yml/dispatches
#   { "ref": "master", "inputs": { "cmd": "docker ps --filter name=etip_" } }
#
# Then poll:
#   GET /repos/manishjnv/intelwatch/actions/runs?event=workflow_dispatch&per_page=1
#   GET /repos/manishjnv/intelwatch/actions/runs/{run_id}/jobs
#   GET /repos/manishjnv/intelwatch/actions/jobs/{job_id}/logs
#
# SAFETY: Read-only commands encouraged. Destructive commands require
# explicit confirmation. Never touches non-etip_ containers.
# ═══════════════════════════════════════════════════════════════

name: VPS Command

on:
  workflow_dispatch:
    inputs:
      cmd:
        description: 'Shell command to run on VPS (runs as root in /opt/intelwatch)'
        required: true
        type: string

jobs:
  run:
    name: Run on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script_stop: false
          script: |
            set -e
            cd /opt/intelwatch
            echo "━━━ VPS Command Runner ━━━"
            echo "Time: $(date -u)"
            echo "Cmd: ${{ inputs.cmd }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            ${{ inputs.cmd }}
            echo ""
            echo "━━━ Done ━━━"
