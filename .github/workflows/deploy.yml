name: ETIP CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status
          - command
      command:
        description: 'Custom command (only when action=command)'
        required: false
        default: ''
        type: string

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== ETIP Deploy ==="

            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master

            docker compose -p etip -f docker-compose.etip.yml pull 2>/dev/null || true
            docker compose -p etip -f docker-compose.etip.yml up -d

            # Reconnect etip_nginx to Caddy's network (required after recreate)
            docker network connect ti-platform_default etip_nginx 2>/dev/null || true
            docker restart ti-platform-caddy-1

            sleep 10
            curl -sf http://127.0.0.1:8080/health || echo "Health pending"

            echo "ETIP:" && docker compose -p etip -f docker-compose.etip.yml ps --format 'table {{.Name}}\t{{.Status}}' 2>/dev/null || true
            echo "Existing:" && docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true
            docker image prune -f 2>/dev/null || true
            echo "=== Done ==="

  status:
    name: VPS Status Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'status'
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== VPS Status ==="
            echo "Uptime: $(uptime)"
            free -h | head -2
            df -h / | tail -1
            echo "ETIP:" && docker compose -p etip -f /opt/intelwatch/docker-compose.etip.yml ps --format 'table {{.Name}}\t{{.Status}}' 2>/dev/null || echo "Not running"
            echo "Existing:" && docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -10 || true
            curl -sf http://127.0.0.1:8080/health 2>/dev/null && echo "" || echo "ETIP not responding"
            echo "=== End ==="

  run_command:
    name: Run VPS Command
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'command'
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "=== Running command ==="
            cd /opt/intelwatch
            ${{ github.event.inputs.command }}
            echo "=== Command complete ==="
