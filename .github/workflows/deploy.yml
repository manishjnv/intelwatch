name: ETIP CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm -r test

  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            echo "=== ETIP Deploy Started ==="
            
            # Safety: check existing site
            docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true
            
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master
            
            # Ensure .env has all required vars
            touch .env
            grep -q TI_POSTGRES_PASSWORD .env || echo 'TI_POSTGRES_PASSWORD=etip_pg_S3cur3_2026!' >> .env
            grep -q TI_REDIS_PASSWORD .env || echo 'TI_REDIS_PASSWORD=etip_redis_S3cur3_2026!' >> .env
            grep -q TI_ELASTICSEARCH_PASSWORD .env || echo 'TI_ELASTICSEARCH_PASSWORD=etip_es_S3cur3_2026!' >> .env
            grep -q TI_NEO4J_PASSWORD .env || echo 'TI_NEO4J_PASSWORD=etip_neo4j_S3cur3_2026!' >> .env
            grep -q TI_MINIO_SECRET_KEY .env || echo 'TI_MINIO_SECRET_KEY=etip_minio_S3cur3_2026!' >> .env
            grep -q TI_JWT_SECRET .env || echo 'TI_JWT_SECRET=etip-jwt-secret-change-me-in-production-2026-v4!' >> .env
            grep -q TI_SERVICE_JWT_SECRET .env || echo 'TI_SERVICE_JWT_SECRET=etip-svc-jwt-2026-internal!' >> .env
            grep -q TI_GRAFANA_PASSWORD .env || echo 'TI_GRAFANA_PASSWORD=etip_grafana_2026!' >> .env
            echo ".env verified"
            
            # Build API container
            echo "Building etip_api..."
            docker compose -p etip -f docker-compose.etip.yml build etip_api 2>&1 | tail -20
            
            # Start all services
            echo "Starting services..."
            docker compose -p etip -f docker-compose.etip.yml up -d
            
            # Wait for postgres+redis healthy, then run migrations
            echo "Waiting for DB..."
            sleep 15
            
            echo "Running Prisma migrations..."
            docker exec etip_api npx prisma migrate deploy --schema=prisma/schema.prisma 2>&1 || \
              docker exec etip_api npx prisma db push --schema=prisma/schema.prisma 2>&1 || \
              echo "Migration: will retry on next deploy"
            
            # Reconnect nginx to Caddy
            docker network connect ti-platform_default etip_nginx 2>/dev/null || true
            docker restart ti-platform-caddy-1 2>/dev/null || true
            
            sleep 10
            
            echo "=== Health Checks ==="
            curl -sf http://127.0.0.1:3001/health && echo "" || echo "API: starting..."
            curl -sf http://127.0.0.1:8080/health && echo "" || echo "Nginx: starting..."
            echo ""
            docker compose -p etip -f docker-compose.etip.yml ps
            echo "=== Deploy Complete ==="
