name: ETIP CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm -r test

  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            echo "=== ETIP Deploy ==="
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master
            echo "Building etip_api..."
            docker compose -p etip -f docker-compose.etip.yml build etip_api 2>&1 | tail -10
            echo "Starting services..."
            docker compose -p etip -f docker-compose.etip.yml up -d
            echo "Running migrations..."
            docker exec etip_api npx prisma migrate deploy --schema=prisma/schema.prisma 2>&1 || echo "Migration: may need initial setup"
            echo "Reconnecting nginx..."
            docker network connect ti-platform_default etip_nginx 2>/dev/null || true
            docker restart ti-platform-caddy-1 2>/dev/null || true
            sleep 10
            echo "=== Health ==="
            curl -sf http://127.0.0.1:3001/health || echo "API: starting..."
            curl -sf http://127.0.0.1:8080/health || echo "Nginx: starting..."
            echo ""
            docker compose -p etip -f docker-compose.etip.yml ps
            echo "=== Done ==="
