# ═══════════════════════════════════════════════════════════════
# ETIP CI/CD Pipeline
# Triggers: push to master (after PR merge)
# Jobs: test → deploy to VPS
# SAFETY: Only touches etip_ containers on VPS
# ═══════════════════════════════════════════════════════════════

name: ETIP CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status
          - migrate
          - command
      command:
        description: 'Custom command (only for action=command)'
        required: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Test ─────────────────────────────────────────────────
  test:
    name: Test, Type-check, Lint & Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # v4 reads pnpm version from package.json "packageManager" field automatically
      # NEVER set 'version' param — conflicts with packageManager (RCA Issue #1)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=prisma/schema.prisma

      - name: Run tests
        run: pnpm --filter '!@etip/ingestion-service' -r test

      - name: Build (tsc -b — strict dependency order, generates .d.ts for cross-package imports)
        run: pnpm exec tsc -b --force tsconfig.build.json

      - name: Type-check (excludes frontend — Vite aliases incompatible with tsc)
        run: pnpm --filter '!@etip/frontend' --filter '!@etip/ingestion-service' -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Docker build validation (API)
        run: docker build -f Dockerfile -t etip-api-ci:test .

      - name: Docker build validation (Frontend)
        run: docker build -f Dockerfile.frontend -t etip-frontend-ci:test .

  # ─── Deploy (on master push or workflow_dispatch) ──────────
  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/master') ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e

            echo "═══ ETIP Deploy Started ═══"
            echo "Time: $(date -u)"

            # ── Safety: verify existing site is healthy ──
            echo "Checking existing containers..."
            docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true

            # ── Pull latest code ──
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master

            # ── Build ETIP containers (with layer caching) ──
            # Issue 15/16 root cause was piping build output to 'tail' (hiding failures)
            # and --no-frozen-lockfile fallback (divergent deps). Both are now fixed.
            # Layer caching is safe: package.json/lockfile layer invalidates on dep changes,
            # source COPY layer invalidates on code changes. No need for --no-cache.
            echo "Building etip_api image..."
            docker compose -p etip -f docker-compose.etip.yml build etip_api

            echo "Building etip_frontend image..."
            docker compose -p etip -f docker-compose.etip.yml build etip_frontend

            # Start infra services (no recreate — preserves uptime)
            echo "Starting infrastructure..."
            docker compose -p etip -f docker-compose.etip.yml up -d etip_postgres etip_redis etip_elasticsearch etip_neo4j etip_minio etip_prometheus etip_grafana

            # Force recreate app containers (picks up new images + compose config)
            echo "Recreating app containers..."
            docker compose -p etip -f docker-compose.etip.yml up -d --force-recreate etip_api etip_frontend etip_nginx

            # ── Run Prisma migrations ──
            echo "Running Prisma migrations..."
            docker exec etip_api npx prisma migrate deploy --schema=prisma/schema.prisma 2>&1 || echo "Migration note: may need 'prisma migrate dev' for first run"

            # ── Caddy network ──
            # etip_nginx auto-joins ti-platform_default via caddy_network in docker-compose.
            # RULE: NEVER use manual 'docker network connect' (03-DEVOPS.md)
            # Only restart Caddy if nginx was fully recreated (not just restarted).
            docker restart ti-platform-caddy-1 2>/dev/null || echo "Caddy restart skipped"

            # ── Wait for health ──
            echo "Waiting for services to be ready..."
            sleep 10

            # ── Health checks ──
            echo ""
            echo "=== Health Checks ==="
            echo -n "API Gateway: "
            curl -sf http://127.0.0.1:3001/health 2>/dev/null && echo "" || echo "PENDING"
            echo -n "Nginx proxy: "
            curl -sf http://127.0.0.1:8080/health 2>/dev/null && echo "" || echo "PENDING"
            echo -n "Frontend: "
            curl -sf http://127.0.0.1:8080/login 2>/dev/null | head -c 100 && echo "" || echo "PENDING"

            # ── Status ──
            echo ""
            echo "=== ETIP Container Status ==="
            docker compose -p etip -f docker-compose.etip.yml ps

            # ── Verify existing site untouched ──
            echo ""
            echo "=== Existing Site (should be unchanged) ==="
            docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true

            # ── Cleanup ──
            docker image prune -f 2>/dev/null || true

            echo ""
            echo "═══ ETIP Deploy Complete ═══"
