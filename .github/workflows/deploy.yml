name: ETIP CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm -r test

  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          command_timeout: 10m
          script: |
            set -x
            echo "=== ETIP Deploy ==="
            
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master
            
            # Ensure .env
            touch .env
            grep -q TI_POSTGRES_PASSWORD .env || echo 'TI_POSTGRES_PASSWORD=etip_pg_S3cur3_2026!' >> .env
            grep -q TI_REDIS_PASSWORD .env || echo 'TI_REDIS_PASSWORD=etip_redis_S3cur3_2026!' >> .env
            grep -q TI_ELASTICSEARCH_PASSWORD .env || echo 'TI_ELASTICSEARCH_PASSWORD=etip_es_S3cur3_2026!' >> .env
            grep -q TI_NEO4J_PASSWORD .env || echo 'TI_NEO4J_PASSWORD=etip_neo4j_S3cur3_2026!' >> .env
            grep -q TI_MINIO_SECRET_KEY .env || echo 'TI_MINIO_SECRET_KEY=etip_minio_S3cur3_2026!' >> .env
            grep -q TI_JWT_SECRET .env || echo 'TI_JWT_SECRET=etip-jwt-secret-change-me-in-production-2026-v4!' >> .env
            grep -q TI_SERVICE_JWT_SECRET .env || echo 'TI_SERVICE_JWT_SECRET=etip-svc-jwt-2026-internal!' >> .env
            grep -q TI_GRAFANA_PASSWORD .env || echo 'TI_GRAFANA_PASSWORD=etip_grafana_2026!' >> .env
            
            echo "=== Building etip_api ==="
            docker compose -p etip -f docker-compose.etip.yml build etip_api 2>&1 | tail -10
            
            echo "=== Starting only infra (no nginx dependency on api) ==="
            docker compose -p etip -f docker-compose.etip.yml up -d etip_postgres etip_redis etip_api
            
            echo "=== Waiting 20s for startup ==="
            sleep 20
            
            echo "=== etip_api container logs ==="
            docker logs etip_api --tail 50 2>&1
            
            echo "=== etip_api container state ==="
            docker inspect etip_api --format '{{.State.Status}} {{.State.ExitCode}} {{.State.Error}}' 2>&1
            
            echo "=== Try health check ==="
            curl -sf http://127.0.0.1:3001/health 2>&1 || echo "Health check failed"
            
            echo "=== If API is healthy, start nginx ==="
            docker compose -p etip -f docker-compose.etip.yml up -d
            
            sleep 5
            docker network connect ti-platform_default etip_nginx 2>/dev/null || true
            docker restart ti-platform-caddy-1 2>/dev/null || true
            
            echo "=== Final status ==="
            docker compose -p etip -f docker-compose.etip.yml ps 2>&1
            curl -sf http://127.0.0.1:3001/health 2>&1 || echo "API still unhealthy"
            curl -sf http://127.0.0.1:8080/health 2>&1 || echo "Nginx proxy unhealthy"
            echo "=== Done ==="
