name: ETIP CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm -r test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          command_timeout: 15m
          script: |
            set -x
            echo "=== ETIP Deploy ==="
            
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master
            
            touch .env
            grep -q TI_POSTGRES_PASSWORD .env || echo 'TI_POSTGRES_PASSWORD=etip_pg_S3cur3_2026!' >> .env
            grep -q TI_REDIS_PASSWORD .env || echo 'TI_REDIS_PASSWORD=etip_redis_S3cur3_2026!' >> .env
            grep -q TI_ELASTICSEARCH_PASSWORD .env || echo 'TI_ELASTICSEARCH_PASSWORD=etip_es_S3cur3_2026!' >> .env
            grep -q TI_NEO4J_PASSWORD .env || echo 'TI_NEO4J_PASSWORD=etip_neo4j_S3cur3_2026!' >> .env
            grep -q TI_MINIO_SECRET_KEY .env || echo 'TI_MINIO_SECRET_KEY=etip_minio_S3cur3_2026!' >> .env
            grep -q TI_JWT_SECRET .env || echo 'TI_JWT_SECRET=etip-jwt-secret-change-me-in-production-2026-v4!' >> .env
            grep -q TI_SERVICE_JWT_SECRET .env || echo 'TI_SERVICE_JWT_SECRET=etip-svc-jwt-2026-internal!' >> .env
            grep -q TI_GRAFANA_PASSWORD .env || echo 'TI_GRAFANA_PASSWORD=etip_grafana_2026!' >> .env
            
            echo "=== Build Images ==="
            docker compose -p etip -f docker-compose.etip.yml build etip_api 2>&1 | tail -10
            docker compose -p etip -f docker-compose.etip.yml build etip_frontend 2>&1 | tail -10
            
            echo "=== Start Infrastructure ==="
            docker compose -p etip -f docker-compose.etip.yml up -d etip_postgres etip_redis 2>&1
            sleep 10
            
            echo "=== Start API ==="
            docker compose -p etip -f docker-compose.etip.yml up -d etip_api 2>&1
            
            echo "=== Wait for API health ==="
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:3001/health >/dev/null 2>&1; then
                echo "API healthy after ${i}0s"
                break
              fi
              echo "  waiting... ($i/12)"
              sleep 10
            done
            
            echo "=== Prisma DB Push ==="
            docker exec etip_api npx prisma db push --schema=prisma/schema.prisma --accept-data-loss 2>&1 || echo "Prisma note"
            
            echo "=== Start Frontend + Remaining ==="
            docker compose -p etip -f docker-compose.etip.yml up -d etip_frontend 2>&1
            sleep 5
            
            echo "=== Start Nginx ==="
            docker compose -p etip -f docker-compose.etip.yml up -d etip_nginx 2>&1
            sleep 3
            
            echo "=== Reconnect Nginx to Caddy ==="
            docker network connect ti-platform_default etip_nginx 2>/dev/null || true
            docker restart ti-platform-caddy-1 2>/dev/null || true
            sleep 5
            
            echo "=== Start Remaining (ES, Neo4j, MinIO, Prometheus, Grafana) ==="
            docker compose -p etip -f docker-compose.etip.yml up -d 2>&1
            
            echo "=== Health Checks ==="
            curl -sf http://127.0.0.1:3001/health 2>/dev/null && echo "" || echo "API: UNHEALTHY"
            curl -sf -o /dev/null -w "Frontend via nginx: HTTP %{http_code}\n" http://127.0.0.1:8080/login 2>/dev/null || echo "Frontend: UNREACHABLE"
            
            echo "=== Container Status ==="
            docker compose -p etip -f docker-compose.etip.yml ps 2>&1
            
            echo "=== API Logs (last 5) ==="
            docker logs etip_api --tail 5 2>&1
            
            echo "=== Done ==="
