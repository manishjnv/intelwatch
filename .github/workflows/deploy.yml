# ═══════════════════════════════════════════════════════════════
# ETIP CI/CD Pipeline
# Triggers: push to master (after PR merge)
# Jobs: test → deploy to VPS
# SAFETY: Only touches etip_ containers on VPS
# ═══════════════════════════════════════════════════════════════

name: ETIP CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status
          - migrate
          - command
      command:
        description: 'Custom command (only for action=command)'
        required: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Test ─────────────────────────────────────────────────
  test:
    name: Test, Type-check, Lint & Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # v4 reads pnpm version from package.json "packageManager" field automatically
      # NEVER set 'version' param — conflicts with packageManager (RCA Issue #1)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=prisma/schema.prisma

      - name: Build (tsc -b — strict dependency order, generates .d.ts for cross-package imports)
        run: pnpm exec tsc -b --force tsconfig.build.json

      - name: Run tests (after build — shared packages must be compiled first, RCA #37)
        run: pnpm -r test

      - name: Type-check (excludes frontend — Vite aliases incompatible with tsc)
        run: pnpm --filter '!@etip/frontend' -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Docker build validation (API)
        run: docker build -f Dockerfile -t etip-api-ci:test .

      - name: Docker build validation (Frontend)
        run: docker build -f Dockerfile.frontend -t etip-frontend-ci:test .

  # ─── Deploy (on master push or workflow_dispatch) ──────────
  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/master') ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config << EOF
          Host vps
            HostName ssh.intelwatch.in
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy via SSH
        timeout-minutes: 25
        run: |
          ssh vps << 'DEPLOY_SCRIPT'
            set -e

            echo "═══ ETIP Deploy Started ═══"
            echo "Time: $(date -u)"

            # ── Safety: verify existing site is healthy ──
            echo "Checking existing containers..."
            docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true

            # ── Pull latest code ──
            cd /opt/intelwatch
            git fetch origin master
            git reset --hard origin/master

            # ── Sync AI config to .env (from GitHub Secrets) ──
            grep -q '^TI_ANTHROPIC_API_KEY=' .env 2>/dev/null && \
              sed -i 's|^TI_ANTHROPIC_API_KEY=.*|TI_ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|' .env || \
              echo 'TI_ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}' >> .env
            grep -q '^TI_AI_ENABLED=' .env 2>/dev/null && \
              sed -i 's|^TI_AI_ENABLED=.*|TI_AI_ENABLED=${{ secrets.TI_AI_ENABLED }}|' .env || \
              echo 'TI_AI_ENABLED=${{ secrets.TI_AI_ENABLED }}' >> .env

            # ── Build images (2 builds instead of 20) ──────────────────
            # All 20 backend services share the same Dockerfile → build once, reuse via image: tag.
            # docker-compose.etip.yml has `image: etip-backend:latest` on all backend services.
            echo "Building backend image (shared by all 20 services)..."
            DOCKER_BUILDKIT=1 docker build -t etip-backend:latest -f Dockerfile .

            echo "Building frontend image..."
            DOCKER_BUILDKIT=1 docker build -t etip-frontend:latest -f Dockerfile.frontend .

            # ── Pre-cleanup: remove ALL orphaned/hash-prefixed containers (RCA #41) ──
            # Must run BEFORE compose up — otherwise compose creates hash-prefixed
            # duplicates when it finds name collisions with stale containers.
            echo "Removing stale orphan containers..."
            docker ps -a --filter "status=created" --filter "status=exited" \
              --format "{{.Names}}" | grep "etip" | xargs -r docker rm -f 2>/dev/null || true

            # Start infra services (no recreate — preserves uptime)
            echo "Starting infrastructure..."
            docker compose -p etip -f docker-compose.etip.yml up -d etip_postgres etip_redis etip_elasticsearch etip_neo4j etip_minio etip_prometheus etip_grafana

            # Force recreate app containers (picks up new images + compose config)
            echo "Recreating app containers..."
            docker compose -p etip -f docker-compose.etip.yml up -d --force-recreate --remove-orphans etip_api etip_ingestion etip_normalization etip_enrichment etip_ioc_intelligence etip_threat_actor_intel etip_malware_intel etip_vulnerability_intel etip_threat_graph etip_correlation etip_hunting etip_drp etip_customization etip_integration etip_user_management etip_onboarding etip_billing etip_admin etip_es_indexing etip_reporting etip_alerting etip_analytics etip_caching etip_frontend etip_nginx

            # ── Sync database schema (idempotent) ──
            echo "Syncing database schema..."
            for i in 1 2 3 4 5; do
              if docker exec etip_api npx prisma db push --schema=prisma/schema.prisma --accept-data-loss 2>&1; then
                echo "✅ Database schema synced"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "⚠️  DB push failed after 5 attempts — continuing (scheduler will retry)"
              fi
              echo "DB push attempt $i failed, retrying in 5s..."
              sleep 5
            done

            # ── Caddy network ──
            docker restart ti-platform-caddy-1 2>/dev/null || echo "Caddy restart skipped"

            # ── Parallel health checks ─────────────────────────────────
            # All services checked concurrently (60s max wall-clock instead of 20×60s sequential)
            echo ""
            echo "=== Health Checks (parallel) ==="

            HEALTH_DIR=$(mktemp -d)
            check_health() {
              local name="$1" port="$2" container="$3" critical="$4"
              for i in $(seq 1 12); do
                if curl -sf "http://127.0.0.1:${port}/health" > /dev/null 2>&1; then
                  echo "${name}: ✅ healthy after $((i * 5))s"
                  echo "ok" > "${HEALTH_DIR}/${container}"
                  return 0
                fi
                sleep 5
              done
              if [ "$critical" = "yes" ]; then
                echo "${name}: ❌ FAILED after 60s"
                docker logs "$container" --tail 20 2>&1 || true
                echo "fail" > "${HEALTH_DIR}/${container}"
                return 1
              else
                echo "${name}: ⚠️  PENDING (non-critical)"
                echo "ok" > "${HEALTH_DIR}/${container}"
                return 0
              fi
            }

            # Launch all checks in background
            check_health "API Gateway"        3001 etip_api                  yes &
            check_health "Ingestion"           3004 etip_ingestion            no  &
            check_health "Normalization"       3005 etip_normalization        yes &
            check_health "Enrichment"          3006 etip_enrichment           yes &
            check_health "IOC Intelligence"    3007 etip_ioc_intelligence     yes &
            check_health "Threat Actor"        3008 etip_threat_actor_intel   yes &
            check_health "Malware Intel"       3009 etip_malware_intel        yes &
            check_health "Vulnerability"       3010 etip_vulnerability_intel  yes &
            check_health "DRP Service"         3011 etip_drp                  no  &
            check_health "Threat Graph"        3012 etip_threat_graph         no  &
            check_health "Correlation"         3013 etip_correlation          no  &
            check_health "Hunting"             3014 etip_hunting              no  &
            check_health "Integration"         3015 etip_integration          no  &
            check_health "User Management"     3016 etip_user_management      no  &
            check_health "Customization"       3017 etip_customization        no  &
            check_health "Onboarding"          3018 etip_onboarding           no  &
            check_health "Billing"             3019 etip_billing              no  &
            check_health "Admin"               3022 etip_admin                no  &
            check_health "ES Indexing"         3020 etip_es_indexing          no  &
            check_health "Reporting"           3021 etip_reporting            no  &
            check_health "Alerting"            3023 etip_alerting             no  &
            check_health "Analytics"           3024 etip_analytics            no  &
            check_health "Caching"             3025 etip_caching              no  &

            # Wait for all background checks
            wait

            # Check nginx + frontend after backends are up
            echo -n "Nginx proxy: "
            for i in 1 2 3 4 5 6; do
              if curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; then
                echo "✅ healthy after $((i * 5))s"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "❌ FAILED after 30s"
                exit 1
              fi
              sleep 5
            done
            echo -n "Frontend: "
            curl -sf http://127.0.0.1:8080/login > /dev/null 2>&1 && echo "✅ serving" || echo "⚠️  PENDING"

            # Fail deploy if any critical service failed
            if grep -rq "fail" "$HEALTH_DIR/" 2>/dev/null; then
              echo "❌ Critical service(s) failed health check — deploy FAILED"
              rm -rf "$HEALTH_DIR"
              exit 1
            fi
            rm -rf "$HEALTH_DIR"

            # ── Status ──
            echo ""
            echo "=== ETIP Container Status ==="
            docker compose -p etip -f docker-compose.etip.yml ps

            echo ""
            echo "=== Existing Site (should be unchanged) ==="
            docker ps --format '{{.Names}} {{.Status}}' | grep -v etip_ | head -5 || true

            # ── Cleanup: prune images + any orphan containers created during deploy ──
            docker ps -a --filter "status=created" --filter "status=exited" \
              --format "{{.Names}}" | grep "etip" | xargs -r docker rm -f 2>/dev/null || true
            docker image prune -f 2>/dev/null || true

            echo ""
            echo "═══ ETIP Deploy Complete ═══"
          DEPLOY_SCRIPT

      # ─── E2E Smoke Tests (master push only, non-blocking) ──────────
      - name: E2E pipeline smoke tests (post-deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        timeout-minutes: 10
        run: |
          ssh vps << 'E2E_SCRIPT'
            set +e
            echo "═══ E2E Smoke Tests ═══"
            cd /opt/intelwatch

            # Guard: skip gracefully if pnpm not installed on VPS host
            if ! command -v pnpm &>/dev/null; then
              echo "⚠️  pnpm not found on VPS host — E2E tests skipped."
              echo "   Install Node 20 + pnpm on the host to enable post-deploy E2E."
              exit 0
            fi

            # Guard: skip if secrets not provided
            if [ -z "$E2E_ADMIN_EMAIL" ] || [ -z "$E2E_ADMIN_PASSWORD" ]; then
              echo "⚠️  E2E_ADMIN_EMAIL or E2E_ADMIN_PASSWORD not set — smoke tests skipped."
              echo "   Add these as GitHub repository secrets to enable E2E CI."
              exit 0
            fi

            E2E_ADMIN_EMAIL="$E2E_ADMIN_EMAIL" \
            E2E_ADMIN_PASSWORD="$E2E_ADMIN_PASSWORD" \
            E2E_API_BASE="http://localhost:3001" \
            E2E_REDIS_URL="redis://localhost:6379" \
            pnpm vitest run tests/e2e/pipeline-smoke.test.ts \
              --config tests/e2e/vitest.config.ts \
              --reporter=verbose 2>&1 | tail -50 || true

            echo "═══ E2E complete (non-blocking) ═══"
            exit 0
          E2E_SCRIPT
